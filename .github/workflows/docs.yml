name: Deploy Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build all docs
        run: |
          mkdir -p public
          
          # Create a mock hg command to prevent scripts from failing in CI
          # (package scripts often include 'hg addremove' which isn't needed here)
          mkdir -p "$GITHUB_WORKSPACE/bin"
          printf '#!/bin/bash\necho "Mock hg: ignoring $*"\nexit 0\n' > "$GITHUB_WORKSPACE/bin/hg"
          chmod +x "$GITHUB_WORKSPACE/bin/hg"
          export PATH="$GITHUB_WORKSPACE/bin:$PATH"
          
          # Loop through all packages in the packages directory
          for dir in packages/*; do
            if [ -d "$dir" ] && [ -f "$dir/package.json" ]; then
              # Get package name and check for docs scripts
              pkg_name=$(node -p "require('./$dir/package.json').name")
              pkg_basename=$(basename "$dir")
              has_docs=$(node -p "const s=require('./$dir/package.json').scripts; !!(s && (s.docs || s['build:docs']))")
              
              if [ "$has_docs" = "true" ]; then
                echo ""
                echo "==================================================="
                echo " Building docs for $pkg_name ($pkg_basename)"
                echo "==================================================="
                
                # Try 'docs' first, then 'build:docs'
                # We use || true just in case, but rely on the folder check
                bun run --filter "$pkg_name" docs || bun run --filter "$pkg_name" build:docs || echo "Build script returned non-zero"
                
                if [ -d "$dir/docs" ]; then
                  echo "Success: Copying docs to public/$pkg_basename"
                  mkdir -p "public/$pkg_basename"
                  cp -r "$dir/docs/"* "public/$pkg_basename/"
                else
                  echo "Error: $dir/docs directory not found after build!"
                fi
              fi
            fi
          done

      - name: Generate landing page
        run: |
          cat <<EOF > public/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>NPM Packages Documentation</title>
              <style>
                  :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
                  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; margin: 0; padding: 2rem; }
                  .container { max-width: 900px; margin: 0 auto; }
                  h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 1rem; color: #0f172a; }
                  p { color: #64748b; margin-bottom: 2rem; }
                  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
                  .card { background: var(--card); border: 1px solid #e2e8f0; border-radius: 12px; padding: 1.5rem; text-decoration: none; color: inherit; transition: all 0.2s ease; display: flex; flex-direction: column; height: 100%; box-sizing: border-box; }
                  .card:hover { transform: translateY(-4px); border-color: var(--primary); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
                  .card h2 { margin: 0; font-size: 1.25rem; color: var(--primary); }
                  .card .path { font-family: monospace; font-size: 0.875rem; color: #94a3b8; margin-top: 0.5rem; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>Documentation</h1>
                  <p>API documentation for packages in the <a href="https://github.com/mnpenner/npm-packages">mnpenner/npm-packages</a> monorepo.</p>
                  <div class="grid">
          EOF
          
          # Add links for each package in public/
          # We sort them alphabetically
          for dir in $(find public -maxdepth 1 -type d | sort); do
            if [ "$dir" != "public" ]; then
              name=$(basename "$dir")
              real_name=$(node -p "try { require('./packages/$name/package.json').name } catch(e) { '$name' }")
              echo "            <a href='$name/' class='card'><h2>$real_name</h2><span class='path'>packages/$name</span></a>" >> public/index.html
            fi
          done
          
          cat <<EOF >> public/index.html
                  </div>
              </div>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
