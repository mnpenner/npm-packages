<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="npm mono app icon">
  <defs>
    <linearGradient id="bg" x1="64" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop stop-color="#CB3837"></stop>
      <stop offset="1" stop-color="#7A1F1F"></stop>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-opacity=".28"></feDropShadow>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"></rect>

  <g filter="url(#shadow)">
    <text x="256" y="228" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="132" font-weight="900" letter-spacing="-8" fill="#ffffff">
      npm
    </text>

    <text x="256" y="346" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="108" font-weight="800" letter-spacing="-6" fill="#ffffff" opacity="0.96">
      mono
    </text>

    <rect x="112" y="374" width="288" height="18" rx="9" fill="#ffffff" opacity="0.18"></rect>
  </g>
</svg>