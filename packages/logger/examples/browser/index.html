<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>BrowserLogger DevTools Example</title>
        <style>
            :root {
                color-scheme: light dark;
                font-family:
                    Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
                    sans-serif;
                background: #f7f7f4;
                color: #1f2933;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
            }

            main {
                width: min(680px, calc(100vw - 32px));
                display: grid;
                gap: 20px;
            }

            h1 {
                margin: 0;
                font-size: 28px;
                font-weight: 700;
            }

            p {
                margin: 0;
                color: #53616f;
                line-height: 1.5;
            }

            .actions {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
            }

            button {
                border: 1px solid #b8c0c8;
                border-radius: 6px;
                background: #ffffff;
                color: #1f2933;
                cursor: pointer;
                font: inherit;
                font-weight: 650;
                padding: 9px 13px;
            }

            button:hover {
                border-color: #64748b;
                background: #f1f5f9;
            }

            code {
                border-radius: 4px;
                background: #eceff3;
                padding: 2px 5px;
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    background: #17191c;
                    color: #edf0f2;
                }

                p {
                    color: #aab3bd;
                }

                button {
                    border-color: #4b5563;
                    background: #24282e;
                    color: #edf0f2;
                }

                button:hover {
                    border-color: #8793a1;
                    background: #2f3640;
                }

                code {
                    background: #252b33;
                }
            }
        </style>
    </head>
    <body>
        <main>
            <h1>BrowserLogger DevTools Example</h1>
            <p>
                Open the browser console to inspect the styled output. The page logs once on load;
                use the buttons to replay individual logger methods.
            </p>
            <div class="actions">
                <button type="button" data-action="all">Run All</button>
                <button type="button" data-action="log">Log</button>
                <button type="button" data-action="info">Info</button>
                <button type="button" data-action="warn">Warn</button>
                <button type="button" data-action="error">Error</button>
                <button type="button" data-action="table">Table</button>
                <button type="button" data-action="clear">Clear Console</button>
            </div>
            <p>Served from <code>packages/logger/examples/browser</code>.</p>
        </main>
        <script type="module" src="/browser-logger.js"></script>
    </body>
</html>
