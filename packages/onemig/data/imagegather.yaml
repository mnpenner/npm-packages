foreignKeys: []
triggers: []
---
name: image_files
options: {}
columns:
  - name: id
    type: binary
    length: 16
  - name: image_id
    type: binary
    length: 16
  - name: width
    type: mediumint
    unsigned: true
    nullable: true
  - name: height
    type: mediumint
    unsigned: true
    nullable: true
  - name: pixels
    type: int
    generated: STORED
    genExpr: '`width` * `height`'
    unsigned: true
    nullable: true
  - name: aspect_ratio
    type: float
    generated: STORED
    genExpr: '`width` / `height`'
    nullable: true
  - name: media_type
    type: varchar
    length: 64
  - name: sha1
    type: binary
    comment: SHA1 of file contents. NULL for sensitive files.
    length: 20
    nullable: true
  - name: hmac_sha256
    type: binary
    comment: HMAC-SHA256 of file contents. HMAC key is secret so as to not reveal file contents.
    length: 32
  - name: size
    type: int
    comment: File size in bytes.
    unsigned: true
  - name: compression_ratio
    type: float
    generated: VIRTUAL
    genExpr: '`size` / (`width` * `height` * ifnull(`channels`,3 + ifnull(`has_alpha`,0)))'
    nullable: true
  - name: b2_file_id
    type: varchar
    length: 1000
  - name: b2_file_name
    type: varchar
    length: 255
  - name: upload_timestamp
    type: bigint
  - name: source
    type: enum
    default: '''ORIGINAL'''
    values:
      - ORIGINAL
      - RESIZED
  - name: image_set_id
    type: binary
    length: 16
    nullable: true
  - name: color_space
    type: varchar
    collation: ascii_general_ci
    length: 100
    nullable: true
  - name: has_alpha
    type: tinyint
    nullable: true
  - name: chroma_subsampling
    type: varchar
    collation: ascii_general_ci
    length: 20
    nullable: true
  - name: color_depth
    type: varchar
    collation: ascii_general_ci
    length: 20
    nullable: true
  - name: channels
    type: tinyint
    nullable: true
  - name: is_progressive
    type: tinyint
    nullable: true
  - name: output_options
    type: longtext
    collation: utf8mb4_bin
    nullable: true
indexes:
  - name: PRIMARY
    type: PRIMARY
    columns:
      - id
  - name: height_idx
    type: INDEX
    columns:
      - height
  - name: image_files_image_id_idx
    type: INDEX
    columns:
      - image_id
  - name: image_files_sha1_idx
    type: INDEX
    columns:
      - sha1
  - name: image_set_id
    type: INDEX
    columns:
      - image_set_id
  - name: images_sha256_uidx
    type: UNIQUE
    columns:
      - hmac_sha256
  - name: upload_timestamp_idx
    type: INDEX
    columns:
      - upload_timestamp
  - name: width_idx
    type: INDEX
    columns:
      - width
foreignKeys: []
triggers: []
