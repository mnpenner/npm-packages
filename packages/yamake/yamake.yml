rules:
  default:
    input:
    - src/index.ts
    auxInput:
    - node_modules/.modules.yaml
    - tsconfig.json
    - package.json
    - pnpm-lock.yaml
    output: dist/index.js
    cmd: esbuild
    args:
      - --bundle
      - src/index.ts
      - --outdir=dist
      - --platform=node
      - --target=node14
