<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <!-- Background Circle -->
    <circle cx="100" cy="100" r="100" fill="#3178C6" stroke="#000" stroke-width="0"/>

    <!-- Decimal Number -->
    <text x="100" y="90" text-anchor="middle" font-size="40" fill="#fff" font-family="Segoe UI, sans-serif">10</text>

    <!-- Arrow -->
    <polygon points="90,110 110,110 100,130" fill="#fff"/>

    <!-- Base Notation -->
    <text x="100" y="160" text-anchor="middle" font-size="24" fill="#fff" font-family="Segoe UI, sans-serif">Base N</text>
</svg>
